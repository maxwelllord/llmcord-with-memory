###########################
#   Discord Bot settings
###########################

# See "How to use" in README.md for setup steps.

bot_token:                # Discord bot token (Bot tab in developer portal)
client_id:                # Application ID (General Information in developer portal)
status_message:           # Custom status shown on bot's profile (max 128 chars)

max_text: 100000          # Max text length per message (including file attachments)
max_images: 5             # Max image attachments per message (only applies to vision models)
max_messages: 25          # Max messages in a reply chain before oldest are dropped

use_plain_responses: true  # Use plaintext instead of embeds (disables streaming and warnings)
allow_dms: true             # Allow direct messages to the bot

# Context window settings (applies to channels, threads, and DMs):
context_gap_minutes: 120    # Minutes of silence before a context gap is inserted
max_context_tokens: 10000   # Token budget for recent message context
context_bridge_tokens: 1000 # Token budget for older "bridge" messages before a gap

# To find Discord IDs: enable Developer Mode in Discord settings (App Settings > Advanced > Developer Mode),
# then right-click any user, role, or channel and select "Copy ID".

permissions:
  users:
    admin_ids: []       # Can switch models with /model and DM the bot even if allow_dms is false
    sweep_ids: []       # Can manually trigger memory sweeps with /sweep
    allowed_ids: []     # Leave empty to allow all users
    blocked_ids: []

  roles:
    allowed_ids: []     # Leave empty to allow all roles (does not affect DMs)
    blocked_ids: []

  channels:
    allowed_ids: []     # Leave empty to allow all channels. Supports category IDs for group control
    blocked_ids: []



#####################
#   LLM settings
#####################

# Add your API key for each provider you plan to use.
# You only need keys for providers referenced by your models, interjection_model, or embedding_model.

providers:
  # Remote providers:
  anthropic:
    base_url: https://api.anthropic.com/v1
    api_key: 

  azure-openai:
    base_url: https://<resource name>.openai.azure.com/openai/deployments/<deployment name>
    api_key:
    extra_query:
      api-version: 2024-12-01-preview

  google:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    api_key:

  groq:
    base_url: https://api.groq.com/openai/v1
    api_key:

  mistral:
    base_url: https://api.mistral.ai/v1
    api_key:

  openai:
    base_url: https://api.openai.com/v1
    api_key:

  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key:

  x-ai:
    base_url: https://api.x.ai/v1
    api_key:

  # Local providers (no API key needed):
  lmstudio:
    base_url: http://localhost:1234/v1

  ollama:
    base_url: http://localhost:11434/v1

  vllm:
    base_url: http://localhost:8000/v1



# Models are specified as provider/model-name. Each model requires its provider to have a valid api_key set above (local providers like ollama are exempt).
# The first model listed is the default. Use /model in Discord to switch.

models:
  openai/gpt-5:
    reasoning_effort: high
    verbosity: medium

  openrouter/x-ai/grok-4-fast:online:

  ollama/llama4:


# Interjection: use a small model to decide if the bot should respond without being @mentioned.
# Omit or leave blank to only respond when @mentioned (default behavior).

# Must reference a provider/model from the providers section above.

interjection_model: openrouter/google/gemma-3-4b-it

interjection_prompt: |
  You decide whether an AI assistant should interject in a Discord conversation. Be conservative. Only say YES if:
  - Someone says hi to the assistant (the assistant is called {bot_name})
  - Someone is asking a question that hasn't been answered
  - Someone is directly asking for help or information the assistant could provide
  - The assistant was recently part of the conversation and a follow-up is natural

  Do NOT interject if users are just chatting, joking, or having a normal conversation. When in doubt, say NO.
  Respond with only YES or NO.

# Embedding model used for semantic memory retrieval.
# Omit or leave blank to disable semantic memory (only core memory will be used).

# Must reference a provider/model from the providers section above.

embedding_model: openrouter/openai/text-embedding-3-small

system_prompt: |
  You are {bot_name}. You are responding to messages within a private discord channel, this is not an "assistant" context. Keep your messages brief and conversational, unless you think the context demands verbosity. Avoid sycophancy and obsequiousness.

  Today's date is {date}. The current time is {time}.

  User messages are prefixed with their Discord ID as <@ID>. Use this format to mention users.


# The sweep prompt has been made configurable PRIMARILY in case you want to reword it to better fit your model's desired personality, or change the length of core-memory.md
# I do not recommend changing anything else.

sweep_prompt: |
  You are {bot_name}. You are performing a memory review after a Discord session. You have two memory stores:

  1. **Core memory** (core_memory.md) — always-loaded identity-level facts. Keep this under 15 lines. Only enduring facts belong here (who people are, key relationships, your own identity). If something is situational or temporary, it belongs in the semantic store via an ADD operation.

  2. **Semantic memory store** — retrieved by similarity per-message. Each entry has an ID. You manage this through operations (ADD, UPDATE, DELETE).

  Your job is to review the session and output TWO sections:

  ## Output format

  ```
  === CORE MEMORY ===
  - fact 1
  - fact 2
  ...

  === OPERATIONS ===
  ADD: "new memory text"
  UPDATE: <id> -> "updated text"
  DELETE: <id>

  SUMMARY: brief description of what changed
  ```

  ## Rules

  CORE MEMORY:
  - Rewrite the entire core memory section. It replaces the file wholesale.
  - Only enduring identity-level facts. Situational stuff goes in semantic memory.
  - Write casually in first person. These are your memories for you.

  OPERATIONS:
  - ADD notable things from the session: facts, preferences, events, emotional context.
  - UPDATE entries that are now outdated or incomplete based on the session.
  - DELETE entries that are clearly wrong, stale, or superseded.
  - Each ADD/UPDATE/DELETE on its own line.
  - Be aggressive about pruning stale entries. A tight store is more valuable than a comprehensive one.

  CONFLICT RESOLUTION:
  - These memories were surfaced during the session: {injected_ids_text}
  - If the conversation contradicts any of them, UPDATE or DELETE them.
  - If core memory needs updating based on the session, update it.

  GENERAL:
  - Every memory entry should be a single concise line.
  - Write casually but succinctly in first person.
  - Output ONLY the format above, nothing else.
